<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Cầu Lông Tracker</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --bg: #F5F5F9; 
      --surface: #FFFFFF; 
      --text-main: #1C1C1E; 
      --text-sub: #8E8E93;
      --primary: #007AFF;
      --primary-light: #E5F0FF;
      --border: #E5E5EA;
      --shadow: 0 4px 24px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* HEADER */
    .header { text-align: center; margin-bottom: 8px; }
    .header h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

    /* SEGMENTED CONTROL (TABS CHUYỂN CHẾ ĐỘ) */
    .tabs-container {
      background: #E3E3E8;
      border-radius: 14px;
      padding: 4px;
      display: flex;
      position: relative;
    }
    .tab {
      flex: 1; text-align: center; padding: 10px 0;
      font-size: 15px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; position: relative; z-index: 2; transition: 0.3s;
    }
    .tab.active { color: var(--text-main); }
    .tab-slider {
      position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px);
      background: var(--surface); border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      z-index: 1;
    }

    /* CARDS CHUNG */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 12px; text-transform: uppercase; font-weight: 700;
      color: var(--text-sub); margin-bottom: 12px; letter-spacing: 0.5px;
    }

    .row { display: flex; gap: 16px; }
    .col { flex: 1; }

    /* INPUTS */
    .input-wrapper { background: var(--bg); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px;}
    .input-wrapper:last-child { margin-bottom: 0; }
    .input-wrapper label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
    
    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%; border: none; background: transparent; outline: none;
      font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; color: var(--primary);
    }
    input[type="date"] { color: var(--text-main); }
    input::placeholder { color: #C7C7CC; }

    /* ĐỘI CỐ ĐỊNH - NÚT BẤM HIỆN ĐẠI MÀU SÁNG */
    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .player-btn {
      background: var(--bg); color: var(--text-sub); border: 2px solid transparent;
      border-radius: 14px; padding: 14px 0; text-align: center;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .player-btn.active {
      background: var(--primary-light); color: var(--primary); border-color: var(--primary);
    }

    /* GIAO LƯU INPUTS */
    .gl-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .gl-row:last-child { border-bottom: none; padding-bottom: 0; }
    .gl-label { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
    .gl-input { background: var(--bg); border-radius: 10px; width: 60px; padding: 8px; text-align: center; font-size: 16px;}

    /* NÚT CHỐT SỔ */
    .btn-submit {
      width: 100%; background: var(--text-main); color: var(--surface);
      padding: 18px; border-radius: 18px; border: none; font-size: 17px; font-weight: 700;
      margin-top: 10px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: 0.2s;
    }
    .btn-submit:active { transform: scale(0.96); }

    /* MODAL HÓA ĐƠN */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
      display: flex; justify-content: center; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    
    .modal-card {
      background: var(--surface); width: 100%; max-width: 450px;
      border-radius: 30px 30px 0 0; padding: 30px 24px;
      transform: translateY(100%); transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .modal-overlay.show .modal-card { transform: translateY(0); }

    .receipt-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 20px; color: var(--primary);}
    .receipt-content { background: var(--bg); padding: 20px; border-radius: 16px; font-size: 15px; line-height: 1.8; margin-bottom: 20px;}
    .divider { border-bottom: 1px dashed #C7C7CC; margin: 12px 0; }
    
    .btn-close {
      width: 100%; background: #E5E5EA; color: var(--text-main);
      padding: 16px; border-radius: 16px; border: none; font-weight: 700; font-size: 16px; cursor: pointer;
    }

    #syncStatus { text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 15px; display: none; color: var(--primary); }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1>Cầu Lông Tracker</h1>
    </div>

    <div class="tabs-container">
      <div class="tab-slider" id="tabSlider"></div>
      <div class="tab active" id="tabHome" onclick="switchMode('home')">Sân Nhà</div>
      <div class="tab" id="tabAway" onclick="switchMode('away')">Sân Khách</div>
    </div>

    <div class="card">
      <div class="input-wrapper">
        <label>📅 THỜI GIAN</label>
        <input type="date" id="dateInput" required>
      </div>
      <div class="row">
        <div class="col input-wrapper">
          <label>💎 TIỀN SÂN</label>
          <input type="text" id="tienSan" placeholder="0" inputmode="numeric" oninput="formatCurrency(this)">
        </div>
        <div class="col input-wrapper">
          <label>🏸 TIỀN CẦU</label>
          <input type="text" id="tienCau" placeholder="0" inputmode="numeric" oninput="formatCurrency(this)">
        </div>
      </div>
    </div>

    <div class="card" id="fixedTeamCard">
      <div class="card-title">Đội Hình Cố Định</div>
      <div class="team-grid">
        <div class="player-btn active" id="btn-Minh" onclick="togglePlayer(this)">🤵🏻‍♂️ Minh</div>
        <div class="player-btn active" id="btn-Thao" onclick="togglePlayer(this)">👩🏻‍💼 Thảo</div>
        <div class="player-btn active" id="btn-Tu" onclick="togglePlayer(this)">🤵🏻‍♂️ Tú</div>
        <div class="player-btn active" id="btn-Quan" onclick="togglePlayer(this)">🤵🏻‍♂️ Quân</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" id="guestTitle">Khách Giao Lưu</div>
      <div class="gl-row">
        <div class="gl-label">🤵🏻‍♂️ Số Nam</div>
        <input type="number" class="gl-input" id="namGL" placeholder="0" min="0" inputmode="numeric">
      </div>
      <div class="gl-row">
        <div class="gl-label">👩🏻‍💼 Số Nữ</div>
        <input type="number" class="gl-input" id="nuGL" placeholder="0" min="0" inputmode="numeric">
      </div>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="processData()">GỬI BÁO CÁO & CHIA TIỀN</button>
  </div>

  <div class="modal-overlay" id="resultModal">
    <div class="modal-card">
      <div class="receipt-title" id="receiptTitle">🧾 BẢNG CHIA TIỀN</div>
      <div id="syncStatus">⏳ Đang gửi tin nhắn cho AI...</div>
      <div class="receipt-content" id="receiptContent"></div>
      <button class="btn-close" onclick="closeModal()">ĐÓNG</button>
    </div>
  </div>

  <script>
    // LINK WEB APP V2.3 CỦA BẠN ĐÃ ĐƯỢC LẮP
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2KNf2aWbSj4tZjku2qAZOcELjsmtD-oOTs_z0CSX-m6rTdM-f8ZTVJ-0hLbCYHnIsyA/exec";

    let currentMode = 'home';

    // Set ngày hôm nay
    document.addEventListener("DOMContentLoaded", () => {
        let today = new Date();
        let local = new Date(today.getTime() - (today.getTimezoneOffset() * 60000));
        document.getElementById('dateInput').value = local.toISOString().split('T')[0];
    });

    // CHUYỂN ĐỔI CHẾ ĐỘ SÂN NHÀ / SÂN KHÁCH MƯỢT MÀ
    function switchMode(mode) {
      currentMode = mode;
      let slider = document.getElementById('tabSlider');
      let tabHome = document.getElementById('tabHome');
      let tabAway = document.getElementById('tabAway');
      let fixedTeamCard = document.getElementById('fixedTeamCard');
      let guestTitle = document.getElementById('guestTitle');

      if (mode === 'home') {
        slider.style.transform = 'translateX(0)';
        tabHome.classList.add('active'); tabAway.classList.remove('active');
        fixedTeamCard.style.display = 'block'; // Hiện đội cố định
        guestTitle.innerText = "Khách Giao Lưu";
      } else {
        slider.style.transform = 'translateX(100%)';
        tabAway.classList.add('active'); tabHome.classList.remove('active');
        fixedTeamCard.style.display = 'none'; // Ẩn hoàn toàn đội cố định
        guestTitle.innerText = "Tổng Số Người Chơi (Chia đều, Nam +20k)";
      }
    }

    function togglePlayer(btn) { btn.classList.toggle('active'); }
    function formatCurrency(input) { let v = input.value.replace(/\D/g, ''); input.value = v ? parseInt(v, 10).toLocaleString('vi-VN') : ""; }
    function formatMoney(n) { return parseInt(n).toLocaleString('vi-VN') + " đ"; }
    function closeModal() { document.getElementById('resultModal').classList.remove('show'); }

    // XỬ LÝ TOÀN BỘ LOGIC
    function processData() {
      let dateRaw = document.getElementById('dateInput').value;
      if(!dateRaw) { alert("Vui lòng chọn ngày!"); return; }
      let dateStr = dateRaw.split('-').reverse().join('/');
      
      let san = parseInt(document.getElementById('tienSan').value.replace(/\./g, '')) || 0;
      let cau = parseInt(document.getElementById('tienCau').value.replace(/\./g, '')) || 0;
      let totalCost = san + cau;

      let namGL = parseInt(document.getElementById('namGL').value) || 0;
      let nuGL = parseInt(document.getElementById('nuGL').value) || 0;

      let webHTML = `<strong>💎 Sân: ${formatMoney(san)}<br>🏸 Cầu: ${formatMoney(cau)}</strong><div class="divider"></div>`;
      let teleMsg = `<b>📊 BẢNG TÍNH ${currentMode === 'away' ? 'SÂN KHÁCH' : 'SÂN NHÀ'} (${dateStr})</b>\n💎 Sân: ${formatMoney(san)} | 🏸 Cầu: ${formatMoney(cau)}\n------------------\n`;

      if (currentMode === 'away') {
        // TÍNH TOÁN SÂN KHÁCH (CHỈ LẤY INPUT NAM/NỮ, BỎ QUA CỐ ĐỊNH)
        let totalP = namGL + nuGL;
        if (totalP === 0) { alert("Vui lòng nhập số người chơi ở Sân Khách!"); return; }

        let offset = namGL * 20000;
        let base = Math.max(0, totalCost - offset) / totalP;
        let pF = Math.ceil(base / 1000) * 1000;
        let pNu = pF;
        let pNam = pF + 20000;

        document.getElementById('receiptTitle').innerText = "🧾 SÂN KHÁCH - " + dateStr;
        if(namGL > 0) {
          webHTML += `🤵🏻‍♂️ Nam (${namGL} người): <strong>${formatMoney(pNam * namGL)}</strong> <span style="font-size:12px;color:#8e8e93">(${formatMoney(pNam)}/ng)</span><br>`;
          teleMsg += `🤵🏻‍♂️ Nam (${namGL}): <b>${formatMoney(pNam * namGL)}</b> (${formatMoney(pNam)}/ng)\n`;
        }
        if(nuGL > 0) {
          webHTML += `👩🏻‍💼 Nữ (${nuGL} người): <strong>${formatMoney(pNu * nuGL)}</strong> <span style="font-size:12px;color:#8e8e93">(${formatMoney(pNu)}/ng)</span><br>`;
          teleMsg += `👩🏻‍💼 Nữ (${nuGL}): <b>${formatMoney(pNu * nuGL)}</b> (${formatMoney(pNu)}/ng)\n`;
        }

      } else {
        // TÍNH TOÁN SÂN NHÀ (CÓ ĐỘI CỐ ĐỊNH)
        let minh = document.getElementById('btn-Minh').classList.contains('active') ? 1 : 0;
        let thao = document.getElementById('btn-Thao').classList.contains('active') ? 1 : 0;
        let tu = document.getElementById('btn-Tu').classList.contains('active') ? 1 : 0;
        let quan = document.getElementById('btn-Quan').classList.contains('active') ? 1 : 0;

        let cM = minh + tu + quan; 
        let totalP = cM + thao + namGL + nuGL;
        
        if (totalP === 0) { alert("Chưa có người chơi nào!"); return; }

        let offset = (cM * 25000) + (nuGL * 5000) + (namGL * 30000);
        let base = Math.max(0, totalCost - offset) / totalP;
        let pF = Math.ceil(base / 1000) * 1000;

        let pNu = pF; let pNam = pF + 25000; let pNamGL = pF + 30000; let pNuGL = pF + 5000;

        document.getElementById('receiptTitle').innerText = "🧾 SÂN NHÀ - " + dateStr;
        
        if(minh) { webHTML += `🤵🏻‍♂️ Minh: <strong>${formatMoney(pNam)}</strong><br>`; teleMsg += `🤵🏻‍♂️ Minh: <b>${formatMoney(pNam)}</b>\n`; }
        if(thao) { webHTML += `👩🏻‍💼 Thảo: <strong>${formatMoney(pNu)}</strong><br>`; teleMsg += `👩🏻‍💼 Thảo: <b>${formatMoney(pNu)}</b>\n`; }
        if(tu) { webHTML += `🤵🏻‍♂️ Tú: <strong>${formatMoney(pNam)}</strong><br>`; teleMsg += `🤵🏻‍♂️ Tú: <b>${formatMoney(pNam)}</b>\n`; }
        if(quan) { webHTML += `🤵🏻‍♂️ Quân: <strong>${formatMoney(pNam)}</strong><br>`; teleMsg += `🤵🏻‍♂️ Quân: <b>${formatMoney(pNam)}</b>\n`; }
        
        if(namGL || nuGL) { webHTML += `<div class="divider"></div>`; teleMsg += `------------------\n`; }
        if(namGL) { webHTML += `👤 Nam GL (${namGL}): <strong>${formatMoney(pNamGL * namGL)}</strong> <span style="font-size:12px;color:#8e8e93">(${formatMoney(pNamGL)}/ng)</span><br>`; teleMsg += `👤 Nam GL (${namGL}): <b>${formatMoney(pNamGL * namGL)}</b>\n`; }
        if(nuGL) { webHTML += `👤 Nữ GL (${nuGL}): <strong>${formatMoney(pNuGL * nuGL)}</strong> <span style="font-size:12px;color:#8e8e93">(${formatMoney(pNuGL)}/ng)</span><br>`; teleMsg += `👤 Nữ GL (${nuGL}): <b>${formatMoney(pNuGL * nuGL)}</b>\n`; }
      }

      // HIỆN MODAL HÓA ĐƠN
      document.getElementById('receiptContent').innerHTML = webHTML;
      document.getElementById('resultModal').classList.add('show');
      
      let syncStatus = document.getElementById('syncStatus');
      syncStatus.style.display = 'block';
      syncStatus.style.color = '#007AFF';
      syncStatus.innerHTML = '⏳ Đang ném hóa đơn cho AI Telegram...';

      // BẮN DATA SANG APPS SCRIPT
      fetch(APPS_SCRIPT_URL, {
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ source: "github_web", reportText: teleMsg })
      }).then(r => r.json()).then(res => {
        if(res.status === "success") {
          syncStatus.style.color = '#34C759'; syncStatus.innerHTML = '✨ AI đã nhận và nhắn tin cho bạn!';
        } else {
          syncStatus.style.color = '#FF3B30'; syncStatus.innerHTML = '❌ Lỗi: ' + res.message;
        }
      }).catch(err => {
        syncStatus.style.color = '#FF3B30'; syncStatus.innerHTML = '❌ Lỗi mạng: Không gửi được Telegram.';
      });
    }
  </script>
</body>
</html>
